<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ghost Rider · Preparación Deportiva</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --bg2: #111; --bg3: #1a1a1a; --bg4: #222;
  --border: #2a2a2a; --border2: #333;
  --gold: #d4a017; --gold2: #f0c040; --gold-dim: rgba(212,160,23,0.12);
  --green: #1a5c2a; --green2: #22782f; --green-dim: rgba(26,92,42,0.2);
  --red: #8b1a1a; --red2: #b02020;
  --blue: #1a4a7a; --blue2: #2060a0;
  --text: #e8e8e8; --text2: #999; --text3: #555;
  --pos-ARQ: #1a4a7a; --pos-DEF: #1a5c2a; --pos-MED: #5c4a1a;
  --pos-DEL: #7a1a1a; --pos-PAR: #3a1a5c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;
  max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* SCREENS */
.screen{display:none;flex-direction:column;height:100vh;overflow:hidden;animation:fadeIn .2s ease;}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:90px;}

/* ── INICIO ── */
#screen-inicio{background:radial-gradient(ellipse at top,#0d200d 0%,var(--bg) 65%);}
.inicio-top{padding:32px 24px 16px;text-align:center;flex-shrink:0;}
.escudo-ring{display:inline-flex;align-items:center;justify-content:center;
  width:74px;height:74px;border-radius:50%;background:var(--bg3);
  border:2px solid var(--gold);box-shadow:0 0 28px rgba(212,160,23,.22),inset 0 0 14px rgba(212,160,23,.06);
  margin-bottom:12px;}
.escudo-txt{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:2px;}
.club-h1{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:5px;color:#fff;line-height:1;}
.club-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:5px;
  color:var(--gold);text-transform:uppercase;margin-top:4px;}
.jugadores-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 14px;}
.jcard{display:flex;align-items:center;gap:14px;padding:13px 14px;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.jcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.jcard.p-ARQ::before{background:var(--pos-ARQ)}.jcard.p-DEF::before{background:var(--pos-DEF)}
.jcard.p-MED::before{background:var(--pos-MED)}.jcard.p-DEL::before{background:var(--pos-DEL)}
.jcard.p-PAR::before{background:var(--pos-PAR)}
.jcard:active{transform:scale(.98);background:var(--bg3);}
.jav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:16px;color:#fff;flex-shrink:0;}
.av-ARQ{background:var(--pos-ARQ)}.av-DEF{background:var(--pos-DEF)}
.av-MED{background:var(--pos-MED)}.av-DEL{background:var(--pos-DEL)}.av-PAR{background:var(--pos-PAR)}
.jinfo{flex:1;min-width:0;}
.jnombre{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.jbadge{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;padding:2px 8px;border-radius:10px;margin-top:3px;}
.jb-ARQ{background:rgba(26,74,122,.45);color:#90c0f0}
.jb-DEF{background:rgba(26,92,42,.45);color:#80d090}
.jb-MED{background:rgba(92,74,26,.45);color:#d0b060}
.jb-DEL{background:rgba(122,26,26,.45);color:#f09090}
.jb-PAR{background:rgba(58,26,92,.45);color:#c090f0}
.jfuncion{font-size:11px;color:var(--text3);margin-top:2px;font-family:'Barlow Condensed';letter-spacing:.5px;}
/* perfil incompleto warning */
.jcard-warn{font-size:10px;color:var(--gold);font-family:'Barlow Condensed';
  letter-spacing:1px;margin-top:3px;}
.btn-admin-entry{margin:14px;padding:13px;background:transparent;
  border:1px solid var(--border2);border-radius:10px;color:var(--text3);
  font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;
  text-transform:uppercase;text-align:center;cursor:pointer;transition:all .15s;display:block;}
.btn-admin-entry:active{background:var(--bg3);color:var(--gold);}
.empty-state{text-align:center;padding:44px 20px;color:var(--text3);}
.empty-state .ei{font-size:44px;margin-bottom:10px;opacity:.25;}
.empty-state p{font-family:'Barlow Condensed';font-size:14px;letter-spacing:1px;line-height:1.6;}

/* ── PERFIL ── */
#screen-perfil{background:var(--bg);}
.pbanner{height:106px;display:flex;align-items:flex-end;padding:0 18px 14px;position:relative;flex-shrink:0;}
.pbanner.p-ARQ{background:linear-gradient(135deg,#06121e 0%,var(--pos-ARQ) 100%)}
.pbanner.p-DEF{background:linear-gradient(135deg,#060f08 0%,var(--pos-DEF) 100%)}
.pbanner.p-MED{background:linear-gradient(135deg,#130f04 0%,var(--pos-MED) 100%)}
.pbanner.p-DEL{background:linear-gradient(135deg,#130606 0%,var(--pos-DEL) 100%)}
.pbanner.p-PAR{background:linear-gradient(135deg,#0a0614 0%,var(--pos-PAR) 100%)}
.btn-back{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.45);border:none;
  color:#fff;width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pav-big{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;
  border:3px solid rgba(255,255,255,.25);flex-shrink:0;}
.pbanner-info{margin-left:12px;}
.pnombre{font-family:'Bebas Neue',sans-serif;font-size:25px;letter-spacing:2px;line-height:1;}
.ppos{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:3px;
  text-transform:uppercase;opacity:.65;margin-top:2px;}
/* tabs */
.ptabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.ptab{flex:1;padding:10px 3px;text-align:center;font-family:'Barlow Condensed',sans-serif;
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.ptab.active{color:var(--gold);border-bottom-color:var(--gold);}
.ptab-icon{font-size:14px;display:block;margin-bottom:2px;}

/* ── FORMULARIO PERFIL FÍSICO ── */
.perfil-form-wrap{padding:16px;}
.perfil-completo-banner{background:var(--green-dim);border:1px solid var(--green2);
  border-radius:10px;padding:12px 14px;margin-bottom:14px;
  font-family:'Barlow Condensed';font-size:13px;letter-spacing:1px;color:#80d090;}
.perfil-incompleto-banner{background:rgba(212,160,23,.1);border:1px solid var(--gold);
  border-radius:10px;padding:12px 14px;margin-bottom:14px;
  font-family:'Barlow Condensed';font-size:13px;letter-spacing:1px;color:var(--gold2);}

/* ── RUTINA ── */
.rutina-wrap{padding:16px;}
.rutina-loading{text-align:center;padding:44px 20px;}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--gold);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-family:'Barlow Condensed';font-size:12px;letter-spacing:2px;
  color:var(--text3);text-transform:uppercase;line-height:1.8;}
.dia-block{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.dia-head{display:flex;justify-content:space-between;align-items:center;
  padding:12px 15px;cursor:pointer;user-select:none;}
.dia-name{font-family:'Barlow Condensed';font-weight:700;font-size:15px;letter-spacing:1px;text-transform:uppercase;}
.dia-badge{font-family:'Barlow Condensed';font-size:10px;letter-spacing:1.5px;
  padding:3px 10px;border-radius:10px;text-transform:uppercase;}
.db-fisico{background:rgba(176,32,32,.25);color:#f08888}
.db-tecnico{background:rgba(26,92,42,.25);color:#80d090}
.db-tactico{background:rgba(92,74,26,.25);color:#d0b060}
.db-descanso{background:rgba(40,40,40,.5);color:var(--text3)}
.db-partido{background:rgba(26,74,122,.25);color:#88b8f8}
.db-circuito{background:rgba(58,26,92,.25);color:#c090f8}
.dia-body{display:none;padding:0 15px 12px;border-top:1px solid var(--border);}
.dia-body.open{display:block;}
.ej-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.ej-row:last-child{border-bottom:none;}
.ej-n{font-family:'Bebas Neue';font-size:18px;color:var(--gold);width:20px;flex-shrink:0;line-height:1.2;}
.ej-d{flex:1;}
.ej-nombre{font-family:'Barlow Condensed';font-weight:600;font-size:14px;}
.ej-det{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.45;}
.btn-gen{display:block;width:100%;padding:14px;
  background:linear-gradient(135deg,var(--green) 0%,var(--green2) 100%);
  border:none;border-radius:10px;color:#fff;font-family:'Barlow Condensed';
  font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;margin-bottom:14px;transition:opacity .15s;}
.btn-gen:active{opacity:.8;} .btn-gen:disabled{opacity:.35;cursor:not-allowed;}
.btn-regen{background:linear-gradient(135deg,#1e1600,#3a2800)!important;}
.needs-profile{background:var(--bg2);border:1px solid var(--gold);border-radius:12px;
  padding:20px;text-align:center;}
.needs-profile p{font-family:'Barlow Condensed';font-size:13px;letter-spacing:1px;
  color:var(--gold2);line-height:1.7;}
.btn-go-profile{margin-top:12px;background:var(--gold);color:var(--bg);
  border:none;border-radius:8px;padding:10px 20px;font-family:'Barlow Condensed';
  font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;}

/* ── HISTORIAL ── */
.historial-wrap{padding:16px;}
.entreno-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:13px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.ec-info{flex:1;}
.ec-fecha{font-family:'Barlow Condensed';font-size:10px;letter-spacing:2px;
  color:var(--text3);text-transform:uppercase;margin-bottom:3px;}
.ec-nombre{font-family:'Barlow Condensed';font-weight:600;font-size:15px;}
.ec-dur{font-size:11px;color:var(--text3);margin-top:2px;}
.ec-nota{font-size:11px;color:var(--text3);margin-top:3px;font-style:italic;}
.check-done{width:28px;height:28px;border-radius:50%;background:var(--green2);
  color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-add-e{display:block;width:100%;padding:13px;background:var(--bg3);
  border:1px dashed var(--border2);border-radius:10px;color:var(--text2);
  font-family:'Barlow Condensed';font-size:12px;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;margin-bottom:12px;transition:all .15s;}
.btn-add-e:active{background:var(--bg4);}

/* ── NOTAS ── */
.notas-wrap{padding:16px;}
.nota-card{background:var(--bg2);border-left:3px solid var(--gold);
  border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:8px;}
.nota-fecha{font-family:'Barlow Condensed';font-size:10px;letter-spacing:2px;
  color:var(--text3);text-transform:uppercase;margin-bottom:4px;}
.nota-txt{font-size:14px;color:var(--text);line-height:1.55;}

/* ── ADMIN ── */
#screen-admin{background:var(--bg);}
.admin-hdr{background:linear-gradient(135deg,#120900,#3a1a00);
  padding:18px 18px 14px;flex-shrink:0;display:flex;align-items:center;gap:12px;}
.admin-badge-lbl{background:var(--gold);color:var(--bg);font-family:'Bebas Neue';
  font-size:12px;letter-spacing:2px;padding:4px 10px;border-radius:4px;}
.admin-title{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;flex:1;}
.atabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.atab{flex:1;padding:11px 3px;text-align:center;font-family:'Barlow Condensed';
  font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.atab.active{color:var(--gold);border-bottom-color:var(--gold);}
.asection{display:none;padding:16px;}
.asection.active{display:block;}
.jad-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.jad-info{flex:1;}
.jad-nombre{font-family:'Barlow Condensed';font-weight:700;font-size:16px;}
.jad-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:'Barlow Condensed';letter-spacing:1px;}
.jad-perfil{font-size:10px;margin-top:3px;font-family:'Barlow Condensed';letter-spacing:1px;}
.jad-perfil.ok{color:#80d090;} .jad-perfil.pend{color:var(--gold);}
.btn-del{background:none;border:1px solid var(--red);color:var(--red2);
  border-radius:6px;padding:5px 10px;font-family:'Barlow Condensed';
  font-size:11px;cursor:pointer;letter-spacing:1px;}
.btn-del:active{background:var(--red);color:#fff;}

/* ── FORMS ── */
.fg{margin-bottom:13px;}
.fg label{display:block;font-family:'Barlow Condensed';font-size:10px;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg3);
  border:1px solid var(--border2);border-radius:8px;padding:11px 13px;
  color:var(--text);font-family:'Barlow';font-size:15px;outline:none;
  transition:border .2s;-webkit-appearance:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);}
.fg textarea{resize:vertical;min-height:75px;}
.fg select option{background:var(--bg3);}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
  padding:13px;border:none;border-radius:10px;font-family:'Barlow Condensed';
  font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;margin-bottom:10px;}
.btn:active{transform:scale(.98);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;}
.btn-danger{background:var(--red2);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.slbl{font-family:'Barlow Condensed';font-size:10px;letter-spacing:3px;
  text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:block;}
.divider{height:1px;background:var(--border);margin:14px 0;}

/* ── PIN OVERLAY ── */
.pin-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
  z-index:300;align-items:center;justify-content:center;}
.pin-ov.open{display:flex;}
.pin-box{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;
  padding:30px 26px;width:290px;text-align:center;animation:popIn .2s ease;}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.pin-ttl{font-family:'Bebas Neue';font-size:22px;letter-spacing:3px;color:var(--gold);margin-bottom:4px;}
.pin-sub{font-size:11px;color:var(--text3);font-family:'Barlow Condensed';letter-spacing:1px;margin-bottom:18px;}
.pin-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);
  border-radius:8px;padding:12px;color:var(--text);font-size:22px;
  text-align:center;letter-spacing:6px;outline:none;margin-bottom:12px;}
.pin-inp:focus{border-color:var(--gold);}
.pin-err{color:#f08080;font-family:'Barlow Condensed';font-size:11px;
  letter-spacing:1px;margin-bottom:10px;min-height:16px;}
.pin-btns{display:flex;gap:8px;}
.pin-btns .btn{flex:1;padding:11px;font-size:12px;margin-bottom:0;}

/* ── MODAL BOTTOM SHEET ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);
  z-index:200;align-items:flex-end;justify-content:center;}
.modal-ov.open{display:flex;}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;
  padding:22px 18px 38px;width:100%;max-width:430px;max-height:82vh;
  overflow-y:auto;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.msheet-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.msheet-ttl{font-family:'Bebas Neue';font-size:21px;letter-spacing:2px;color:var(--gold);}
.mclose{background:var(--bg3);border:none;color:var(--text2);width:30px;height:30px;
  border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* nivel chips */
.nivel-chips{display:flex;gap:8px;margin-top:6px;}
.nchip{flex:1;padding:9px 6px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:8px;text-align:center;font-family:'Barlow Condensed';font-size:12px;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;color:var(--text2);}
.nchip.sel{border-color:var(--gold);background:var(--gold-dim);color:var(--gold2);}
.nchip:active{transform:scale(.96);}
</style>
</head>
<body>

<!-- ══ INICIO ══ -->
<div id="screen-inicio" class="screen active">
  <div class="inicio-top">
    <div class="escudo-ring"><span class="escudo-txt" style="font-size:26px">🔥</span></div>
    <div class="club-h1">GHOST RIDER</div>
    <div class="club-sub">Preparación Deportiva · Abogados C</div>
  </div>
  <div class="jugadores-scroll" id="jugadoresLista"></div>
  <button class="btn-admin-entry" onclick="abrirPin()">⚙ Administrador · Maxi Vete</button>
</div>

<!-- ══ PERFIL JUGADOR ══ -->
<div id="screen-perfil" class="screen">
  <div class="pbanner" id="perfilBanner">
    <button class="btn-back" onclick="showScreen('inicio')">‹</button>
    <div class="pav-big" id="perfilAv"></div>
    <div class="pbanner-info">
      <div class="pnombre" id="perfilNombre"></div>
      <div class="ppos" id="perfilPos"></div>
    </div>
  </div>
  <div class="ptabs">
    <div class="ptab active" onclick="showPTab('fisico')"><span class="ptab-icon">📋</span>Mi Perfil</div>
    <div class="ptab" onclick="showPTab('rutina')"><span class="ptab-icon">⚡</span>Rutina</div>
    <div class="ptab" onclick="showPTab('historial')"><span class="ptab-icon">📅</span>Historial</div>
    <div class="ptab" onclick="showPTab('notas')"><span class="ptab-icon">📝</span>Notas</div>
  </div>
  <div class="scroll-body">
    <div id="ptab-fisico" class="perfil-form-wrap"></div>
    <div id="ptab-rutina" class="rutina-wrap" style="display:none"></div>
    <div id="ptab-historial" class="historial-wrap" style="display:none"></div>
    <div id="ptab-notas" class="notas-wrap" style="display:none"></div>
  </div>
</div>

<!-- ══ ADMIN ══ -->
<div id="screen-admin" class="screen">
  <div class="admin-hdr">
    <button class="btn-back" style="position:relative;top:0;left:0;background:rgba(0,0,0,.35)" onclick="showScreen('inicio')">‹</button>
    <div class="admin-title">PANEL ADMIN</div>
    <div class="admin-badge-lbl">MAXI VETE</div>
  </div>
  <div class="atabs">
    <div class="atab active" onclick="showATab('jugadores')">Plantel</div>
    <div class="atab" onclick="showATab('agregar')">+ Nuevo</div>
    <div class="atab" onclick="showATab('notas')">Notas</div>
    <div class="atab" onclick="showATab('config')">Config</div>
  </div>
  <div class="scroll-body">
    <div id="atab-jugadores" class="asection active"><div id="adminPlantel"></div></div>
    <div id="atab-agregar" class="asection">
      <span class="slbl">Nuevo integrante</span>
      <div class="fg"><label>Nombre completo</label><input type="text" id="nNombre" placeholder="Ej: Gonzalo Pérez"></div>
      <div class="fg"><label>Posición</label>
        <select id="nPos">
          <option value="ARQ">🥅 Arquero</option>
          <option value="DEF">🛡 Defensor</option>
          <option value="MED">⚙ Mediocampista</option>
          <option value="DEL">⚡ Delantero</option>
          <option value="PAR">🔥 Parrillero</option>
        </select>
      </div>
      <div class="fg"><label>Función específica</label><input type="text" id="nFuncion" placeholder="Ej: Lateral derecho, volante mixto..."></div>
      <button class="btn btn-gold" onclick="agregarJugador()">✓ Agregar al plantel</button>
    </div>
    <div id="atab-notas" class="asection">
      <span class="slbl">Nota para un jugador</span>
      <div class="fg"><label>Jugador</label><select id="notaSel"></select></div>
      <div class="fg"><label>Nota del preparador</label><textarea id="notaTxt" placeholder="Observaciones, trabajo extra, indicaciones..."></textarea></div>
      <button class="btn btn-gold" onclick="guardarNota()">✓ Guardar nota</button>
    </div>
    <div id="atab-config" class="asection">
      <span class="slbl">Cambiar PIN</span>
      <div class="fg"><label>PIN actual</label><input type="password" id="pinActual" placeholder="PIN actual" maxlength="6"></div>
      <div class="fg"><label>PIN nuevo</label><input type="password" id="pinNuevo" placeholder="Mínimo 4 dígitos" maxlength="6"></div>
      <button class="btn btn-ghost" onclick="cambiarPin()" style="margin-bottom:20px">Cambiar PIN</button>
      <div class="divider"></div>
      <span class="slbl" style="margin-top:14px;color:var(--red2)">Zona peligrosa</span>
      <button class="btn btn-danger" onclick="borrarTodo()">🗑 Borrar todos los datos</button>
    </div>
  </div>
</div>

<!-- ══ PIN OVERLAY ══ -->
<div class="pin-ov" id="pinOv">
  <div class="pin-box">
    <div class="pin-ttl">🔥 GHOST RIDER</div>
    <div class="pin-sub">Acceso administrador</div>
    <input type="password" class="pin-inp" id="pinInp" maxlength="6" placeholder="••••" inputmode="numeric">
    <div class="pin-err" id="pinErr"></div>
    <div class="pin-btns">
      <button class="btn btn-ghost" onclick="cerrarPin()">Cancelar</button>
      <button class="btn btn-gold" onclick="verificarPin()">Entrar</button>
    </div>
  </div>
</div>

<!-- ══ MODAL ENTRENO ══ -->
<div class="modal-ov" id="modalEntreno">
  <div class="modal-sheet">
    <div class="msheet-hdr">
      <span class="msheet-ttl">Registrar entreno</span>
      <button class="mclose" onclick="cerrarModal('modalEntreno')">✕</button>
    </div>
    <div class="fg"><label>Actividad</label><input type="text" id="eNombre" placeholder="Ej: Circuito de velocidad"></div>
    <div class="fg"><label>Fecha</label><input type="date" id="eFecha"></div>
    <div class="fg"><label>Duración (min)</label><input type="number" id="eDur" placeholder="60"></div>
    <div class="fg"><label>¿Cómo me sentí?</label><textarea id="eNota" placeholder="Observaciones personales..."></textarea></div>
    <button class="btn btn-green" onclick="guardarEntreno()">✓ Guardar</button>
  </div>
</div>

<script type="module">
// ═══════════════════════ FIREBASE ═══════════════════════
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBgIoIXumt2OTp3GDmKGpra5ZVP64MGLiw",
  authDomain: "ghostriderabogadosc.firebaseapp.com",
  projectId: "ghostriderabogadosc",
  storageBucket: "ghostriderabogadosc.firebasestorage.app",
  messagingSenderId: "688487636418",
  appId: "1:688487636418:web:a8d6c5b87fdd2987ea8a5b"
};

const fireApp = initializeApp(firebaseConfig);
const fireDB = getFirestore(fireApp);
const DB_DOC = doc(fireDB, 'ghostrider', 'data');

// ═══════════════════════ DATOS ═══════════════════════
let db = { pin:'1234', jugadores:[] };
let jActual = null;

async function loadDB() {
  try {
    const snap = await getDoc(DB_DOC);
    if (snap.exists()) {
      db = snap.data();
    } else {
      await setDoc(DB_DOC, db);
    }
  } catch(e) {
    db = JSON.parse(localStorage.getItem('abogadosC_v2') || 'null') || { pin:'1234', jugadores:[] };
  }
  renderInicio();
}

const save = async () => {
  try {
    await setDoc(DB_DOC, JSON.parse(JSON.stringify(db)));
    localStorage.setItem('abogadosC_v2', JSON.stringify(db));
  } catch(e) {
    localStorage.setItem('abogadosC_v2', JSON.stringify(db));
  }
};

const POS_LBL = {ARQ:'🥅 Arquero',DEF:'🛡 Defensor',MED:'⚙ Mediocampista',DEL:'⚡ Delantero',PAR:'🔥 Parrillero'};
const POS_INI = {ARQ:'ARQ',DEF:'DEF',MED:'MED',DEL:'DEL',PAR:'🍖'};
const COND_LBL = {bajo:'Baja',medio:'Media',alto:'Alta'};

function perfilCompleto(j) {
  return j.peso && j.altura && j.edad && j.condicion && j.frecuencia;
}

// ═══════════════════════ NAVEGACIÓN ═══════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  if (id === 'inicio') renderInicio();
  if (id === 'admin') renderAdmin();
}

function showPTab(tab) {
  ['fisico','rutina','historial','notas'].forEach(t => {
    document.getElementById('ptab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.ptab').forEach((el,i) => {
    el.classList.toggle('active', ['fisico','rutina','historial','notas'][i] === tab);
  });
  if (tab === 'fisico') renderFisicoForm();
  if (tab === 'rutina') renderRutina();
  if (tab === 'historial') renderHistorial();
  if (tab === 'notas') renderNotas();
}

function showATab(tab) {
  document.querySelectorAll('.asection').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.atab').forEach(el => el.classList.remove('active'));
  document.getElementById('atab-' + tab).classList.add('active');
  ['jugadores','agregar','notas','config'].forEach((t,i) => {
    if (t === tab) document.querySelectorAll('.atab')[i].classList.add('active');
  });
  if (tab === 'notas') poblarNotaSel();
}

// ═══════════════════════ INICIO ═══════════════════════
function renderInicio() {
  const cont = document.getElementById('jugadoresLista');
  if (!db.jugadores.length) {
    cont.innerHTML = `<div class="empty-state"><div class="ei">⚽</div><p>Sin jugadores aún<br>El admin agrega el plantel</p></div>`;
    return;
  }
  const orden = ['ARQ','DEF','MED','DEL','PAR'];
  const sorted = [...db.jugadores].sort((a,b) => orden.indexOf(a.pos) - orden.indexOf(b.pos));
  cont.innerHTML = sorted.map(j => {
    const ok = perfilCompleto(j);
    return `<div class="jcard p-${j.pos}" onclick="abrirPerfil('${j.id}')">
      <div class="jav av-${j.pos}">${POS_INI[j.pos]}</div>
      <div class="jinfo">
        <div class="jnombre">${j.nombre}</div>
        <span class="jbadge jb-${j.pos}">${POS_LBL[j.pos]}</span>
        ${j.funcion ? `<div class="jfuncion">${j.funcion}</div>` : ''}
        ${!ok ? `<div class="jcard-warn">⚠ Perfil físico incompleto</div>` : ''}
      </div>
      <span style="color:var(--text3);font-size:18px">›</span>
    </div>`;
  }).join('');
}

function abrirPerfil(id) {
  jActual = db.jugadores.find(j => j.id === id);
  if (!jActual) return;
  document.getElementById('perfilBanner').className = `pbanner p-${jActual.pos}`;
  document.getElementById('perfilAv').className = `pav-big av-${jActual.pos}`;
  document.getElementById('perfilAv').textContent = POS_INI[jActual.pos];
  document.getElementById('perfilNombre').textContent = jActual.nombre;
  document.getElementById('perfilPos').textContent = POS_LBL[jActual.pos] + (jActual.funcion ? ' · ' + jActual.funcion : '');
  showPTab('fisico');
  showScreen('perfil');
}

// ═══════════════════════ PERFIL FÍSICO ═══════════════════════
function renderFisicoForm() {
  const j = jActual;
  const ok = perfilCompleto(j);
  const imc = (j.peso && j.altura) ? (j.peso / Math.pow(j.altura/100,2)).toFixed(1) : null;
  document.getElementById('ptab-fisico').innerHTML = `
    ${ok
      ? `<div class="perfil-completo-banner">✓ Perfil completo · La IA puede generar tu rutina personalizada</div>`
      : `<div class="perfil-incompleto-banner">⚠ Completá tus datos para recibir una rutina 100% personalizada</div>`
    }
    <span class="slbl">Mis datos físicos</span>
    <div class="fg-row" style="margin-bottom:13px">
      <div class="fg" style="margin-bottom:0">
        <label>Peso (kg)</label>
        <input type="number" id="fPeso" value="${j.peso||''}" placeholder="75" onchange="guardarDatoFisico('peso',this.value)">
      </div>
      <div class="fg" style="margin-bottom:0">
        <label>Altura (cm)</label>
        <input type="number" id="fAltura" value="${j.altura||''}" placeholder="175" onchange="guardarDatoFisico('altura',this.value)">
      </div>
    </div>
    <div class="fg-row" style="margin-bottom:13px">
      <div class="fg" style="margin-bottom:0">
        <label>Edad</label>
        <input type="number" id="fEdad" value="${j.edad||''}" placeholder="28" onchange="guardarDatoFisico('edad',this.value)">
      </div>
      <div class="fg" style="margin-bottom:0">
        <label>Días/semana que entrenás</label>
        <select id="fFrec" onchange="guardarDatoFisico('frecuencia',this.value)">
          <option value="">—</option>
          ${[1,2,3,4,5,6,7].map(n => `<option value="${n}" ${j.frecuencia==n?'selected':''}>${n} día${n>1?'s':''}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="fg">
      <label>Nivel de condición física</label>
      <div class="nivel-chips">
        ${['bajo','medio','alto'].map(n => `
          <div class="nchip ${j.condicion===n?'sel':''}" onclick="selNivel('${n}')">${n === 'bajo' ? '🟡 Básico' : n === 'medio' ? '🟢 Regular' : '🔴 Alto'}</div>
        `).join('')}
      </div>
    </div>
    <div class="fg">
      <label>Lesiones o limitaciones físicas</label>
      <textarea id="fLesiones" placeholder="Ej: Rodilla derecha, lumbar. O escribí Ninguna." onchange="guardarDatoFisico('lesiones',this.value)">${j.lesiones||''}</textarea>
    </div>
    ${imc ? `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-family:'Barlow Condensed';font-size:12px;letter-spacing:2px;color:var(--text3);text-transform:uppercase">IMC calculado</span>
      <span style="font-family:'Bebas Neue';font-size:28px;color:var(--gold2)">${imc}</span>
    </div>` : ''}
    <div style="margin-top:14px">
      <button class="btn btn-green" onclick="guardarPerfilCompleto()">✓ Guardar perfil</button>
    </div>
  `;
}

function selNivel(nivel) {
  guardarDatoFisico('condicion', nivel);
  document.querySelectorAll('.nchip').forEach(el => el.classList.remove('sel'));
  event.target.classList.add('sel');
}

function guardarDatoFisico(campo, val) {
  if (!jActual) return;
  jActual[campo] = val;
  syncJugador();
}

async function guardarPerfilCompleto() {
  if (!jActual) return;
  jActual.peso = document.getElementById('fPeso')?.value || jActual.peso;
  jActual.altura = document.getElementById('fAltura')?.value || jActual.altura;
  jActual.edad = document.getElementById('fEdad')?.value || jActual.edad;
  jActual.frecuencia = document.getElementById('fFrec')?.value || jActual.frecuencia;
  jActual.lesiones = document.getElementById('fLesiones')?.value || jActual.lesiones;
  syncJugador();
  renderFisicoForm();
  // borrar caché de rutina si cambió el perfil
  delete jActual[`rutina_cache`];
  syncJugador();
}

async function syncJugador() {
  const idx = db.jugadores.findIndex(j => j.id === jActual.id);
  if (idx >= 0) db.jugadores[idx] = { ...jActual };
  await save();
}

// ═══════════════════════ RUTINA IA ═══════════════════════
function renderRutina() {
  const cont = document.getElementById('ptab-rutina');
  const j = jActual;
  if (!perfilCompleto(j)) {
    cont.innerHTML = `
      <div class="needs-profile">
        <p>⚠ Para generar tu rutina personalizada<br>primero completá tu perfil físico</p>
        <button class="btn-go-profile" onclick="showPTab('fisico')">Ir a Mi Perfil →</button>
      </div>`;
    return;
  }
  if (j.rutina_cache) {
    mostrarRutina(cont, j.rutina_cache);
    return;
  }
  cont.innerHTML = `
    <button class="btn-gen" id="btnGen" onclick="generarRutina()">
      🔥 Ghost Rider — Generar mi rutina
    </button>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;color:var(--text3)">
      <div style="font-size:36px;margin-bottom:8px;opacity:.2">📋</div>
      <div style="font-family:'Barlow Condensed';font-size:13px;letter-spacing:1px">Sin rutina generada aún</div>
    </div>`;
}

async function generarRutina() {
  const j = jActual;
  const cont = document.getElementById('ptab-rutina');
  const btn = document.getElementById('btnGen');
  if (btn) { btn.disabled = true; btn.textContent = 'Generando...'; }
  cont.innerHTML = `<div class="rutina-loading">
    <div class="spinner"></div>
    <div class="loading-txt">Ghost Rider analizando a<br>${j.nombre}<br>${POS_LBL[j.pos]}</div>
  </div>`;

  const prompt = `Sos GHOST RIDER, el sistema de preparación deportiva del equipo de fútbol amateur "Abogados C" de Corrientes, Argentina.
Generá una rutina semanal de entrenamiento ESPECÍFICA Y DETALLADA para este jugador:

POSICIÓN: ${POS_LBL[j.pos]}${j.funcion ? ' — ' + j.funcion : ''}
PESO: ${j.peso} kg | ALTURA: ${j.altura} cm | EDAD: ${j.edad} años
CONDICIÓN FÍSICA: ${COND_LBL[j.condicion] || j.condicion}
DÍAS DISPONIBLES PARA ENTRENAR: ${j.frecuencia} días por semana
LESIONES O LIMITACIONES: ${j.lesiones || 'Ninguna'}
${j.pos === 'PAR' ? '\nEste jugador es el PARRILLERO del equipo. Generá una rutina funcional humorística pero con ejercicios reales: resistencia de pie, fuerza de brazos para manejar parrilla, resistencia al calor, etc.' : ''}

PRIORIDADES DEL ENTRENAMIENTO:
- Velocidad y tiempo de reacción
- Fuerza y potencia explosiva
- Resistencia cardiovascular
- Técnica específica para ${POS_LBL[j.pos]}
- Flexibilidad y prevención de lesiones

Adaptá la intensidad y volumen a su nivel de condición (${j.condicion}) y sus días disponibles (${j.frecuencia}/semana).
${j.lesiones && j.lesiones.toLowerCase() !== 'ninguna' ? `IMPORTANTE: Evitar ejercicios que afecten: ${j.lesiones}` : ''}

Respondé SOLO con JSON válido, sin markdown, sin texto extra:
{
  "semana": [
    {
      "dia": "Lunes",
      "tipo": "fisico|tecnico|tactico|circuito|partido|descanso",
      "foco": "descripción breve del foco del día",
      "duracion": "45 min",
      "ejercicios": [
        {"nombre": "nombre", "detalle": "series, repeticiones, tiempo y descripción"}
      ]
    }
  ]
}
Incluir los 7 días. Días de descanso con ejercicios vacíos. Ejercicios MUY específicos para la posición y condición del jugador.`;

  try {
    const resp = await fetch('/.netlify/functions/rutina', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await resp.json();
    const raw = data.content.map(b => b.text||'').join('');
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    jActual.rutina_cache = parsed;
    syncJugador();
    mostrarRutina(cont, parsed);
  } catch(e) {
    cont.innerHTML = `
      <button class="btn-gen" onclick="generarRutina()">⟳ Reintentar</button>
      <div style="color:#f08080;font-family:'Barlow Condensed';font-size:12px;letter-spacing:1px;padding:16px;text-align:center">Error al generar. Verificá tu conexión a internet.</div>`;
  }
}

function mostrarRutina(cont, data) {
  cont.innerHTML = `
    <button class="btn-gen btn-regen" onclick="regenerarRutina()">⟳ Regenerar rutina</button>
  ` + data.semana.map((dia, idx) => `
    <div class="dia-block">
      <div class="dia-head" onclick="toggleDia(${idx})">
        <div>
          <div class="dia-name">${dia.dia}</div>
          ${dia.foco ? `<div style="font-size:11px;color:var(--text3);font-family:'Barlow Condensed';letter-spacing:.5px;margin-top:2px">${dia.foco}${dia.duracion ? ' · ' + dia.duracion : ''}</div>` : ''}
        </div>
        <span class="dia-badge db-${dia.tipo}">${dia.tipo}</span>
      </div>
      ${dia.ejercicios && dia.ejercicios.length ? `
        <div class="dia-body" id="db-${idx}">
          ${dia.ejercicios.map((ej,ei) => `
            <div class="ej-row">
              <div class="ej-n">${ei+1}</div>
              <div class="ej-d">
                <div class="ej-nombre">${ej.nombre}</div>
                <div class="ej-det">${ej.detalle}</div>
              </div>
            </div>
          `).join('')}
        </div>` : ''}
    </div>
  `).join('');
}

function toggleDia(idx) {
  const el = document.getElementById('db-' + idx);
  if (el) el.classList.toggle('open');
}

function regenerarRutina() {
  if (!jActual) return;
  delete jActual.rutina_cache;
  syncJugador();
  generarRutina();
}

// ═══════════════════════ HISTORIAL ═══════════════════════
function renderHistorial() {
  const cont = document.getElementById('ptab-historial');
  const hist = (jActual.historial || []).slice().reverse();
  cont.innerHTML = `<button class="btn-add-e" onclick="abrirModalEntreno()">+ Registrar entrenamiento</button>` +
    (hist.length === 0
      ? `<div style="text-align:center;padding:30px;color:var(--text3);font-family:'Barlow Condensed';font-size:13px;letter-spacing:1px">Sin entrenamientos registrados aún</div>`
      : hist.map(e => `
        <div class="entreno-card">
          <div class="ec-info">
            <div class="ec-fecha">${formatFecha(e.fecha)}</div>
            <div class="ec-nombre">${e.nombre}</div>
            ${e.duracion ? `<div class="ec-dur">⏱ ${e.duracion} min</div>` : ''}
            ${e.nota ? `<div class="ec-nota">"${e.nota}"</div>` : ''}
          </div>
          <div class="check-done">✓</div>
        </div>`).join('')
    );
}

function abrirModalEntreno() {
  document.getElementById('eFecha').value = new Date().toISOString().split('T')[0];
  ['eNombre','eDur','eNota'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modalEntreno').classList.add('open');
}

async function guardarEntreno() {
  const nombre = document.getElementById('eNombre').value.trim();
  if (!nombre) { alert('Ingresá el nombre de la actividad'); return; }
  if (!jActual.historial) jActual.historial = [];
  jActual.historial.push({
    id: Date.now(), nombre,
    fecha: document.getElementById('eFecha').value,
    duracion: document.getElementById('eDur').value,
    nota: document.getElementById('eNota').value.trim()
  });
  await syncJugador();
  cerrarModal('modalEntreno');
  renderHistorial();
}

// ═══════════════════════ NOTAS ═══════════════════════
function renderNotas() {
  const notas = (jActual.notas || []).slice().reverse();
  document.getElementById('ptab-notas').innerHTML =
    notas.length === 0
      ? `<div style="text-align:center;padding:30px;color:var(--text3);font-family:'Barlow Condensed';font-size:13px;letter-spacing:1px">Sin notas del preparador</div>
         <div style="text-align:center;font-size:11px;color:var(--text3);font-family:'Barlow Condensed';letter-spacing:1px;padding:0 20px">Las notas las carga Maxi Vete desde el panel de administrador</div>`
      : notas.map(n => `
        <div class="nota-card">
          <div class="nota-fecha">${formatFecha(n.fecha)}</div>
          <div class="nota-txt">${n.txt}</div>
        </div>`).join('');
}

// ═══════════════════════ ADMIN ═══════════════════════
function renderAdmin() { renderAdminPlantel(); }

function renderAdminPlantel() {
  const cont = document.getElementById('adminPlantel');
  if (!db.jugadores.length) {
    cont.innerHTML = `<div style="color:var(--text3);font-family:'Barlow Condensed';font-size:13px;letter-spacing:1px;padding:20px;text-align:center">Sin jugadores. Agregá desde "Nuevo".</div>`;
    return;
  }
  const orden = ['ARQ','DEF','MED','DEL','PAR'];
  const sorted = [...db.jugadores].sort((a,b) => orden.indexOf(a.pos)-orden.indexOf(b.pos));
  cont.innerHTML = sorted.map(j => `
    <div class="jad-card">
      <div class="jav av-${j.pos}" style="width:38px;height:38px;font-size:13px">${POS_INI[j.pos]}</div>
      <div class="jad-info">
        <div class="jad-nombre">${j.nombre}</div>
        <div class="jad-sub">${POS_LBL[j.pos]}${j.funcion?' · '+j.funcion:''}</div>
        <div class="jad-perfil ${perfilCompleto(j)?'ok':'pend'}">
          ${perfilCompleto(j) ? '✓ Perfil completo' : '⚠ Perfil incompleto'}
        </div>
      </div>
      <button class="btn-del" onclick="eliminarJugador('${j.id}')">Quitar</button>
    </div>`).join('');
}

async function agregarJugador() {
  const nombre = document.getElementById('nNombre').value.trim();
  if (!nombre) { alert('Ingresá el nombre'); return; }
  db.jugadores.push({
    id:'j_'+Date.now(), nombre,
    pos: document.getElementById('nPos').value,
    funcion: document.getElementById('nFuncion').value.trim(),
    historial:[], notas:[]
  });
  await save();
  ['nNombre','nFuncion'].forEach(id => document.getElementById(id).value='');
  showATab('jugadores');
  renderAdminPlantel();
}

async function eliminarJugador(id) {
  if (!confirm('¿Quitar jugador del plantel?')) return;
  db.jugadores = db.jugadores.filter(j => j.id !== id);
  await save(); renderAdminPlantel();
}

function poblarNotaSel() {
  document.getElementById('notaSel').innerHTML =
    db.jugadores.map(j => `<option value="${j.id}">${j.nombre} (${POS_LBL[j.pos]})</option>`).join('');
}

async function guardarNota() {
  const id = document.getElementById('notaSel').value;
  const txt = document.getElementById('notaTxt').value.trim();
  if (!txt) { alert('Escribí una nota'); return; }
  const idx = db.jugadores.findIndex(j => j.id === id);
  if (idx < 0) return;
  if (!db.jugadores[idx].notas) db.jugadores[idx].notas = [];
  db.jugadores[idx].notas.push({ fecha: new Date().toISOString().split('T')[0], txt });
  await save();
  document.getElementById('notaTxt').value = '';
  alert('Nota guardada ✓');
}

async function cambiarPin() {
  const actual = document.getElementById('pinActual').value;
  const nuevo = document.getElementById('pinNuevo').value;
  if (actual !== db.pin) { alert('PIN actual incorrecto'); return; }
  if (nuevo.length < 4) { alert('El PIN nuevo debe tener al menos 4 dígitos'); return; }
  db.pin = nuevo; await save();
  ['pinActual','pinNuevo'].forEach(id => document.getElementById(id).value='');
  alert('PIN cambiado ✓');
}

async function borrarTodo() {
  if (!confirm('¿Borrar TODOS los datos del equipo?')) return;
  if (!confirm('Última confirmación. Se perderá todo.')) return;
  localStorage.removeItem('abogadosC_v2');
  db = { pin:'1234', jugadores:[] }; await save();
  showScreen('inicio');
}

// ═══════════════════════ PIN ═══════════════════════
function abrirPin() {
  document.getElementById('pinInp').value='';
  document.getElementById('pinErr').textContent='';
  document.getElementById('pinOv').classList.add('open');
  setTimeout(()=>document.getElementById('pinInp').focus(),100);
}
function cerrarPin() { document.getElementById('pinOv').classList.remove('open'); }
function verificarPin() {
  if (document.getElementById('pinInp').value === db.pin) {
    cerrarPin(); showScreen('admin');
  } else {
    document.getElementById('pinErr').textContent='PIN incorrecto';
    document.getElementById('pinInp').value='';
  }
}
document.getElementById('pinInp').addEventListener('keydown', e => { if(e.key==='Enter') verificarPin(); });

// ═══════════════════════ UTILS ═══════════════════════
function cerrarModal(id) { document.getElementById(id).classList.remove('open'); }
function formatFecha(iso) {
  if (!iso) return '—';
  const [y,m,d] = iso.split('-');
  const M=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${d} ${M[parseInt(m)-1]} ${y}`;
}
document.getElementById('modalEntreno').addEventListener('click',function(e){if(e.target===this)cerrarModal('modalEntreno');});
document.getElementById('pinOv').addEventListener('click',function(e){if(e.target===this)cerrarPin();});

// Iniciar con Firebase
loadDB();
</script>
